AWSTemplateFormatVersion: "2010-09-09"
Description: Example - Using Mappings to choose instance type per environment

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - uat
      - prod
    Description: "Select the environment: dev | uat | prod"

Mappings:
  EnvToInstanceType:
    dev:
      InstanceType: t3.micro
    uat:
      InstanceType: t3.small
    prod:
      InstanceType: c7i-flex.large

Resources:
  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-07e29570afffc72c1
      InstanceType: !FindInMap [EnvToInstanceType, !Ref Environment, InstanceType]
      Tags:
        - Key: Name
          Value: !Sub "mapping-demo-${Environment}"

Outputs:
  SelectedInstanceType:
    Value: !FindInMap [EnvToInstanceType, !Ref Environment, InstanceType]
    Description: "The instance type chosen based on the environment"
